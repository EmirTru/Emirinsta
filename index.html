<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Süper Hızlı Emirinsta</title>
    <style>
        :root { --ig-bg: #fafafa; --ig-blue: #0095f6; --ig-border: #dbdbdb; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: var(--ig-bg); }
        .header { position:fixed; top:0; width:100%; height:50px; background:white; border-bottom:1px solid #dbdbdb; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:1.2rem; z-index:1000; }
        .nav { position:fixed; bottom:0; width:100%; height:50px; background:white; border-top:1px solid #dbdbdb; display:flex; justify-content:space-around; align-items:center; }
        .content { margin-top:60px; margin-bottom:60px; padding:10px; }
        .msg { background:white; padding:10px; border-radius:10px; margin-bottom:5px; border:1px solid #eee; }
        .msg b { color:var(--ig-blue); display:block; font-size:0.8rem; }
        .input-area { display:flex; gap:5px; margin-top:10px; }
        input { flex:1; padding:10px; border:1px solid #dbdbdb; border-radius:5px; }
        button { padding:10px 20px; background:var(--ig-blue); color:white; border:none; border-radius:5px; font-weight:bold; }
        .post-card { background:white; border:1px solid #dbdbdb; margin-bottom:15px; border-radius:8px; overflow:hidden; }
        .post-card img { width:100%; display:block; max-height:300px; object-fit:cover; }
        .hidden { display:none; }
    </style>
</head>
<body>

    <!-- GİRİŞ -->
    <div id="login-zone" style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="margin-bottom:20px;">Emirinsta</h1>
        <input type="text" id="user-name" placeholder="Kullanıcı Adın" style="width:250px; margin-bottom:10px;">
        <button onclick="startApp()">Başla</button>
    </div>

    <!-- ANA UYGULAMA -->
    <div id="app-zone" class="hidden">
        <div class="header">Emirinsta</div>
        
        <div class="content" id="chat-tab">
            <h3 style="margin-bottom:10px;">Global Sohbet</h3>
            <div id="chat-logs" style="height:300px; overflow-y:auto; margin-bottom:10px; display:flex; flex-direction:column;"></div>
            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Bir şeyler yaz...">
                <button onclick="sendMsg()">Gönder</button>
            </div>
        </div>

        <div class="content hidden" id="blog-tab">
            <button onclick="document.getElementById('post-modal').classList.toggle('hidden')" style="width:100%; margin-bottom:20px;">+ Paylaşım Yap</button>
            <div id="post-modal" class="hidden" style="background:#eee; padding:10px; margin-bottom:20px; border-radius:10px;">
                <input type="text" id="blog-img" placeholder="Resim Linki (Opsiyonel)" style="margin-bottom:5px; width:100%;">
                <input type="text" id="blog-txt" placeholder="Düşüncelerin..." style="margin-bottom:10px; width:100%;">
                <button onclick="sendPost()">Yayınla</button>
            </div>
            <div id="blog-list"></div>
        </div>

        <div class="nav">
            <button onclick="show('chat')">Sohbet</button>
            <button onclick="show('blog')">Blog</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIK0LHEqw6gEi6fwWER4i6HK9Aoxr4ECk",
            authDomain: "emirinsta.firebaseapp.com",
            projectId: "emirinsta",
            storageBucket: "emirinsta.firebasestorage.app",
            messagingSenderId: "1054133758624",
            appId: "1:1054133758624:web:a7ec89a1e9cf350aafb7c5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UYGULAMAYI BAŞLAT
        window.startApp = () => {
            const name = document.getElementById('user-name').value.trim();
            if(!name) return alert("İsim yazmalısın!");
            localStorage.setItem('insta_user', name);
            document.getElementById('login-zone').classList.add('hidden');
            document.getElementById('app-zone').classList.remove('hidden');
            loadAll();
        };

        // OTOMATİK GİRİŞ
        if(localStorage.getItem('insta_user')) { 
            document.getElementById('user-name').value = localStorage.getItem('insta_user');
            window.startApp();
        }

        // MESAJ GÖNDER
        window.sendMsg = async () => {
            const txt = document.getElementById('chat-input').value;
            if(!txt) return;
            try {
                await addDoc(collection(db, "messages"), {
                    user: localStorage.getItem('insta_user'),
                    text: txt,
                    time: serverTimestamp()
                });
                document.getElementById('chat-input').value = '';
            } catch(e) { alert("HATA: Mesaj veritabanına kaydedilemedi! Kuralları 'true' yaptığından emin ol."); }
        };

        // BLOG PAYLAŞ
        window.sendPost = async () => {
            const img = document.getElementById('blog-img').value;
            const txt = document.getElementById('blog-txt').value;
            if(!txt) return alert("Yazı yazmalısın!");
            try {
                await addDoc(collection(db, "posts"), {
                    user: localStorage.getItem('insta_user'),
                    img: img,
                    txt: txt,
                    time: serverTimestamp()
                });
                document.getElementById('blog-img').value = ''; document.getElementById('blog-txt').value = '';
                document.getElementById('post-modal').classList.add('hidden');
            } catch(e) { alert("HATA: Blog kaydedilemedi!"); }
        };

        // VERİLERİ ÇEK
        function loadAll() {
            // Canlı Sohbet
            onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
                const box = document.getElementById('chat-logs');
                box.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    box.innerHTML += `<div class="msg"><b>${d.user}:</b> ${d.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
            // Canlı Blog
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
                const list = document.getElementById('blog-list');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="post-card">
                            ${d.img ? `<img src="${d.img}">` : ''}
                            <div style="padding:10px;"><b>${d.user}:</b> ${d.txt}</div>
                        </div>`;
                });
            });
        }

        // TAB GEÇİŞİ
        window.show = (tab) => {
            document.getElementById('chat-tab').classList.add('hidden');
            document.getElementById('blog-tab').classList.add('hidden');
            document.getElementById(tab + '-tab').classList.remove('hidden');
        };
    </script>
</body>
</html>
